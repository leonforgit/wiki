<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Knowledge Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #30363d;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #58a6ff;
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #8b949e;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat-value {
            color: #58a6ff;
            font-weight: 600;
        }
        #graph-container {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #graph-container:active {
            cursor: grabbing;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: rgba(22, 27, 34, 0.9);
            color: #c9d1d9;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        .control-btn:hover {
            background: #30363d;
            border-color: #58a6ff;
        }
        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            z-index: 100;
            font-size: 12px;
        }
        .legend-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #58a6ff;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .tooltip {
            position: absolute;
            padding: 10px 15px;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid #30363d;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 300px;
            z-index: 1000;
        }
        .tooltip-title {
            font-weight: 600;
            color: #58a6ff;
            margin-bottom: 5px;
        }
        .tooltip-meta {
            color: #8b949e;
            font-size: 11px;
        }
        .tooltip-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        .tooltip-tag {
            padding: 2px 8px;
            background: rgba(88, 166, 255, 0.1);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 4px;
            font-size: 10px;
            color: #58a6ff;
        }
        .search-box {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 101;
        }
        .search-input {
            width: 300px;
            padding: 8px 15px;
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid #30363d;
            border-radius: 20px;
            color: #c9d1d9;
            font-size: 13px;
            outline: none;
        }
        .search-input:focus {
            border-color: #58a6ff;
        }
        .search-input::placeholder {
            color: #6e7681;
        }
        .node-label {
            font-size: 11px;
            fill: #c9d1d9;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .back-link {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 101;
            padding: 8px 15px;
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s;
        }
        .back-link:hover {
            background: #30363d;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🕸️ Wiki Knowledge Graph</h1>
        <div class="stats">
            <div class="stat-item">
                <span>Pages:</span>
                <span class="stat-value" id="stat-pages">0</span>
            </div>
            <div class="stat-item">
                <span>Links:</span>
                <span class="stat-value" id="stat-links">0</span>
            </div>
            <div class="stat-item">
                <span>Tags:</span>
                <span class="stat-value" id="stat-tags">0</span>
            </div>
        </div>
    </div>

    <a href="index.md" class="back-link">← Back to Wiki</a>

    <div class="search-box">
        <input type="text" class="search-input" id="search" placeholder="Search pages...">
    </div>

    <div id="graph-container"></div>

    <div class="controls">
        <button class="control-btn" onclick="zoomIn()" title="Zoom In">+</button>
        <button class="control-btn" onclick="zoomOut()" title="Zoom Out">−</button>
        <button class="control-btn" onclick="resetZoom()" title="Reset">⟲</button>
    </div>

    <div class="legend">
        <div class="legend-title">Page Types</div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #58a6ff;"></div>
            <span>Entity</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #7ee787;"></div>
            <span>Concept</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #ffa657;"></div>
            <span>Comparison</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #d2a8ff;"></div>
            <span>Query/Summary</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background: #8b949e;"></div>
            <span>Note</span>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        // Graph data
        const graphData = {"nodes": [{"id": "SCHEMA", "title": "Schema", "type": "note", "tags": [], "path": "SCHEMA.md"}, {"id": "log", "title": "Log", "type": "note", "tags": [], "path": "log.md"}, {"id": "index", "title": "Index", "type": "note", "tags": [], "path": "index.md"}, {"id": "README", "title": "Readme", "type": "note", "tags": [], "path": "README.md"}, {"id": "concepts/aero-engine-industry", "title": "\u822a\u7a7a\u53d1\u52a8\u673a\u884c\u4e1a\u6df1\u5ea6\u5206\u6790", "type": "concept", "tags": ["finance", "industry", "tech", "china", "manufacturing"], "path": "concepts/aero-engine-industry.md"}, {"id": "concepts/ray-dalio-hormuz-analysis", "title": "Ray Dalio \u5173\u4e8e\u970d\u5c14\u6728\u5179\u6d77\u5ce1\u5371\u673a\u7684\u5206\u6790", "type": "concept", "tags": ["finance", "news", "person", "opinion", "geopolitics"], "path": "concepts/ray-dalio-hormuz-analysis.md"}], "edges": [{"source": "SCHEMA", "target": "wikilinks", "type": "links_to"}, {"source": "SCHEMA", "target": "wikilinks", "type": "links_to"}, {"source": "SCHEMA", "target": "wikilinks", "type": "links_to"}, {"source": "SCHEMA", "target": "wikilink", "type": "links_to"}, {"source": "SCHEMA", "target": "related-page", "type": "links_to"}, {"source": "SCHEMA", "target": "another-page", "type": "links_to"}, {"source": "index", "target": "aero-engine-industry", "type": "links_to"}, {"source": "index", "target": "ray-dalio-hormuz-analysis", "type": "links_to"}, {"source": "concepts/aero-engine-industry", "target": "C919", "type": "links_to"}, {"source": "concepts/aero-engine-industry", "target": "C929", "type": "links_to"}, {"source": "concepts/aero-engine-industry", "target": "\u4e2d\u56fd\u822a\u53d1", "type": "links_to"}, {"source": "concepts/aero-engine-industry", "target": "\u822a\u53d1\u52a8\u529b", "type": "links_to"}, {"source": "concepts/aero-engine-industry", "target": "\u4e24\u673a\u4e13\u9879", "type": "links_to"}, {"source": "concepts/aero-engine-industry", "target": "\u9002\u822a\u53d6\u8bc1", "type": "links_to"}, {"source": "concepts/ray-dalio-hormuz-analysis", "target": "\u77f3\u6cb9\u7f8e\u5143\u4f53\u7cfb", "type": "links_to"}, {"source": "concepts/ray-dalio-hormuz-analysis", "target": "\u50a8\u5907\u8d27\u5e01", "type": "links_to"}, {"source": "concepts/ray-dalio-hormuz-analysis", "target": "\u5730\u7f18\u653f\u6cbb\u98ce\u9669", "type": "links_to"}, {"source": "concepts/ray-dalio-hormuz-analysis", "target": "\u6865\u6c34\u57fa\u91d1", "type": "links_to"}], "tag_groups": {"finance": ["concepts/aero-engine-industry", "concepts/ray-dalio-hormuz-analysis"], "industry": ["concepts/aero-engine-industry"], "tech": ["concepts/aero-engine-industry"], "china": ["concepts/aero-engine-industry"], "manufacturing": ["concepts/aero-engine-industry"], "news": ["concepts/ray-dalio-hormuz-analysis"], "person": ["concepts/ray-dalio-hormuz-analysis"], "opinion": ["concepts/ray-dalio-hormuz-analysis"], "geopolitics": ["concepts/ray-dalio-hormuz-analysis"]}, "stats": {"total_pages": 6, "total_links": 18, "total_tags": 9}};
        
        // Update stats
        document.getElementById('stat-pages').textContent = graphData.stats.total_pages;
        document.getElementById('stat-links').textContent = graphData.stats.total_links;
        document.getElementById('stat-tags').textContent = graphData.stats.total_tags;
        
        // Color scheme for page types
        const typeColors = {
            'entity': '#58a6ff',
            'concept': '#7ee787',
            'comparison': '#ffa657',
            'query': '#d2a8ff',
            'summary': '#d2a8ff',
            'note': '#8b949e',
            'default': '#8b949e'
        };
        
        // Setup SVG
        const container = d3.select('#graph-container');
        const width = window.innerWidth;
        const height = window.innerHeight;
        
        const svg = container.append('svg')
            .attr('width', width)
            .attr('height', height)
            .attr('viewBox', [0, 0, width, height]);
        
        // Add zoom behavior
        const g = svg.append('g');
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on('zoom', (event) => g.attr('transform', event.transform));
        svg.call(zoom);
        
        // Create force simulation
        const simulation = d3.forceSimulation(graphData.nodes)
            .force('link', d3.forceLink(graphData.edges)
                .id(d => d.id)
                .distance(100))
            .force('charge', d3.forceManyBody().strength(-300))
            .force('center', d3.forceCenter(width / 2, height / 2))
            .force('collision', d3.forceCollide().radius(30));
        
        // Draw links
        const link = g.append('g')
            .attr('stroke', '#30363d')
            .attr('stroke-opacity', 0.6)
            .selectAll('line')
            .data(graphData.edges)
            .join('line')
            .attr('stroke-width', 1.5);
        
        // Draw nodes
        const node = g.append('g')
            .selectAll('g')
            .data(graphData.nodes)
            .join('g')
            .call(d3.drag()
                .on('start', dragstarted)
                .on('drag', dragged)
                .on('end', dragended));
        
        // Node circles
        node.append('circle')
            .attr('r', d => d.type === 'entity' ? 12 : 8)
            .attr('fill', d => typeColors[d.type] || typeColors.default)
            .attr('stroke', '#0d1117')
            .attr('stroke-width', 2)
            .style('cursor', 'pointer');
        
        // Node labels
        node.append('text')
            .attr('class', 'node-label')
            .attr('x', d => d.type === 'entity' ? 16 : 12)
            .attr('y', 4)
            .text(d => d.title.length > 20 ? d.title.substring(0, 20) + '...' : d.title);
        
        // Tooltip
        const tooltip = d3.select('#tooltip');
        
        node.on('mouseover', (event, d) => {
            tooltip.style('opacity', 1)
                .html(`
                    <div class="tooltip-title">${d.title}</div>
                    <div class="tooltip-meta">Type: ${d.type} | Path: ${d.path}</div>
                    ${d.tags.length ? '<div class="tooltip-tags">' + 
                        d.tags.map(t => `<span class="tooltip-tag">${t}</span>`).join('') + 
                        '</div>' : ''}
                `)
                .style('left', (event.pageX + 10) + 'px')
                .style('top', (event.pageY - 10) + 'px');
        })
        .on('mouseout', () => tooltip.style('opacity', 0))
        .on('click', (event, d) => {
            window.location.href = d.path.replace('.md', '.html');
        });
        
        // Update positions on tick
        simulation.on('tick', () => {
            link
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);
            
            node.attr('transform', d => `translate(${d.x},${d.y})`);
        });
        
        // Drag functions
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        // Zoom controls
        function zoomIn() {
            svg.transition().call(zoom.scaleBy, 1.3);
        }
        
        function zoomOut() {
            svg.transition().call(zoom.scaleBy, 0.7);
        }
        
        function resetZoom() {
            svg.transition().call(zoom.transform, d3.zoomIdentity);
        }
        
        // Search functionality
        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            if (!term) {
                node.style('opacity', 1);
                link.style('opacity', 0.6);
                return;
            }
            
            const matched = graphData.nodes.filter(n => 
                n.title.toLowerCase().includes(term) ||
                n.id.toLowerCase().includes(term) ||
                n.tags.some(t => t.toLowerCase().includes(term))
            ).map(n => n.id);
            
            node.style('opacity', d => matched.includes(d.id) ? 1 : 0.1);
            link.style('opacity', d => 
                matched.includes(d.source.id) && matched.includes(d.target.id) ? 0.6 : 0.05
            );
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            svg.attr('width', w).attr('height', h).attr('viewBox', [0, 0, w, h]);
            simulation.force('center', d3.forceCenter(w / 2, h / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
